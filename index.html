<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="static/bootstrap.min.css" rel="stylesheet">
    <script src="static/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <form method="post">
    <div class="container">
        <div class="row p-3">
            <h1>Emo<span class="text-warning">Sense</span></h1>
        </div>
        <div class="row">
            <div class="col p-3">
                <h1>Understand <span class="text-warning">Emotion</span> at Scale</h1>
                <p>Real-time sentiment and emotion detection across text, voice, and facial data. Built for developers who need accuracy that actually matters.</p>
                <button type="submit" class="btn btn-warning rounded-3" formaction="{{url_for('predict')}}">Try Free Demo</button>
            </div>
            <div class="col">
                <div class="row">
                    <div class="p-3">Joy <div class="progress" role="progressbar" aria-label="Success example" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
                         <div class="progress-bar bg-success" style="width: 25%"></div>
                      </div>
                    </div>
                    <div class="p-3">Surprise <div class="progress" role="progressbar" aria-label="Info example" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar bg-info p-3" style="width: 50%"></div>
                        </div>
                      </div>
                    <div class="p-3">Neutral <div class="progress " role="progressbar" aria-label="Warning example" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar bg-warning p-3" style="width: 75%"></div>
                      </div>
                      </div>
                    <div class="p-3">Sadness <div class="progress " role="progressbar" aria-label="Danger example" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar bg-danger p-3" style="width: 100%"></div>
                      </div>
                      </div>
                    <div class="p-3"> Anger<div class="progress " role="progressbar" aria-label="Danger example" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar bg-danger p-3" style="width: 100%"></div>
                      </div>
                      </div>
                </div>
            </div>
        </div>
    </div>
</form>
</body>
</html>
